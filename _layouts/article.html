<!DOCTYPE html>
<html lang="ja">

<head>
  {% include head.html %}
</head>

<body>
  {% include header.html %}

  <main id="main">
    <div class="article-content">
      <div class="article-header">
        <h1 class="article-title">{{ page.title }}</h1>
        <div class="article-meta">
          <div class="author-info">
            <span class="author-icon">@</span>
            <span class="author-name">{{ page.author }}</span>
          </div>
          <div class="meta-info">
            <time datetime="{{ page.date | date_to_xmlschema }}">
              {{ page.date | date: "%Y-%m-%d" }}
            </time>
          </div>
        </div>
        {% if page.tags %}
        <div class="article-tags">
          {% for tag in page.tags %}
          <a href="{{ '/article-list/' | relative_url }}?tag={{ tag }}" class="tag">{{ tag }}</a>
          {% endfor %}
        </div>
        {% endif %}
      </div>
      <div class="main-content">
        {{content}}
      </div>
      <!-- open がデフォルト: JS 無効でも目次が見える(モバイルでは toc.js が初期状態で閉じる) -->
      <details class="toc-collapsible" open>
        <summary>目次</summary>
        <div class="table-of-content" id="toc">
        </div>
      </details>
    </div>
  </main>

  {% include footer.html %}
  <script type="text/javascript" src="{{ '/assets/js/toc.js' | relative_url }}"></script>
</body>

</html>
